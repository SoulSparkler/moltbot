services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_LOG_DIR: /home/node/.openclaw/logs
      CLAWDBOT_STATE_DIR: /home/node/.openclaw
      MOLTBOT_STATE_DIR: /home/node/.openclaw
      RSS_STATE_PATH: /home/node/.openclaw/state/etsy_rss.json
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ${OPENCLAW_HOST_DATA_ROOT:-/data/openclaw}:/home/node/.openclaw
    ports:
      - "${OPENCLAW_GATEWAY_PUBLISH_HOST:-0.0.0.0}:${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    entrypoint: ["bash", "/app/scripts/deploy/run-gateway.sh"]
    command: ["gateway", "run"]
    init: true
    restart: unless-stopped

  mission-control:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    depends_on:
      - openclaw-gateway
    env_file:
      - .env
    environment:
      HOME: /home/node
      NODE_ENV: production
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_MISSION_CONTROL_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_MISSION_CONTROL_GATEWAY_URL: ${OPENCLAW_MISSION_CONTROL_GATEWAY_URL:-ws://openclaw-gateway:18789}
      OPENCLAW_MISSION_CONTROL_GATEWAY_TOKEN: ${OPENCLAW_MISSION_CONTROL_GATEWAY_TOKEN}
      CLAWDBOT_STATE_DIR: /home/node/.openclaw
      MOLTBOT_STATE_DIR: /home/node/.openclaw
      MISSION_CONTROL_HOST: ${MISSION_CONTROL_HOST:-0.0.0.0}
      MISSION_CONTROL_PORT: ${MISSION_CONTROL_PORT:-3021}
    volumes:
      - ${OPENCLAW_HOST_DATA_ROOT:-/data/openclaw}:/home/node/.openclaw:ro
    ports:
      - "${MISSION_CONTROL_PUBLISH_HOST:-127.0.0.1}:${MISSION_CONTROL_PORT:-3021}:${MISSION_CONTROL_PORT:-3021}"
    entrypoint: ["bash", "/app/scripts/deploy/run-mission-control.sh"]
    init: true
    restart: unless-stopped

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    profiles: ["cli"]
    env_file:
      - .env
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      CLAWDBOT_STATE_DIR: /home/node/.openclaw
      MOLTBOT_STATE_DIR: /home/node/.openclaw
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
    volumes:
      - ${OPENCLAW_HOST_DATA_ROOT:-/data/openclaw}:/home/node/.openclaw
    entrypoint: ["node", "/app/openclaw.mjs"]
    stdin_open: true
    tty: true
    init: true
